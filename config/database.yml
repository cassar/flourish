default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  primary:
    <<: *default
    database: flourish_development
  cache:
    <<: *default
    database: flourish_development_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: flourish_development_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: flourish_development_cable
    migrations_paths: db/cable_migrate

test:
  primary:
    <<: *default
    database: flourish_test

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>
    migrations_paths: db/cable_migrate
