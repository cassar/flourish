steps:
  - label: ":ruby: Test"
    key: test
    command: |
      ECR=416802459241.dkr.ecr.ap-southeast-2.amazonaws.com
      CI_IMAGE=$$ECR/flourish-ci:latest
      aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin $$ECR
      docker pull $$CI_IMAGE 2>/dev/null || true
      docker build -f Dockerfile.ci --cache-from $$CI_IMAGE --label service=flourish_ci -t $$CI_IMAGE .
      docker push $$CI_IMAGE
      docker run --rm \
        -e RAILS_ENV=test \
        -e CI=true \
        $$CI_IMAGE \
        bin/rails db:test:prepare test test:system
    artifact_paths: "coverage/**/*"
    agents:
      queue: default-queue

  - wait

  - label: ":docker: Build & Push"
    key: build
    command:
      - docker image prune -af --filter "label!=service=flourish"
      - aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin 416802459241.dkr.ecr.ap-southeast-2.amazonaws.com
      - docker build --label service=flourish --tag 416802459241.dkr.ecr.ap-southeast-2.amazonaws.com/flourish:$$BUILDKITE_COMMIT --tag 416802459241.dkr.ecr.ap-southeast-2.amazonaws.com/flourish:latest .
      - docker push 416802459241.dkr.ecr.ap-southeast-2.amazonaws.com/flourish:$$BUILDKITE_COMMIT
      - docker push 416802459241.dkr.ecr.ap-southeast-2.amazonaws.com/flourish:latest
    agents:
      queue: default-queue

  - wait

  - label: ":rocket: Deploy"
    key: deploy
    command:
      - |
        RAILS_MASTER_KEY=$(aws ssm get-parameter --region ap-southeast-2 --name /cassar-code/flourish/rails_master_key --with-decryption --query Parameter.Value --output text)
        KAMAL_REGISTRY_PASSWORD=$(aws ecr get-login-password --region ap-southeast-2)
        printf "RAILS_MASTER_KEY=%s\nKAMAL_REGISTRY_PASSWORD=%s\n" "$RAILS_MASTER_KEY" "$KAMAL_REGISTRY_PASSWORD" > .kamal/secrets
        kamal deploy --skip-push
    agents:
      queue: default-queue
    branches: main
