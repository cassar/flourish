steps:
  - label: ":docker: Warm CI Cache"
    key: warm-cache
    concurrency: 1
    concurrency_group: cassar/docker-build
    command: |
      ECR=416802459241.dkr.ecr.ap-southeast-2.amazonaws.com
      CI_REPO=flourish-ci
      LOCK_SHA=$$(sha256sum Gemfile.lock | cut -d' ' -f1)
      if aws ecr describe-images --repository-name $$CI_REPO --image-ids imageTag=$$LOCK_SHA --region ap-southeast-2 > /dev/null 2>&1; then
        echo "CI image $$CI_REPO:$$LOCK_SHA already exists, skipping build"
      else
        docker pull $$ECR/$$CI_REPO:latest 2>/dev/null || true
        docker build -f Dockerfile.ci \
          --cache-from $$ECR/$$CI_REPO:latest \
          --label service=flourish_ci \
          -t $$ECR/$$CI_REPO:$$LOCK_SHA \
          -t $$ECR/$$CI_REPO:latest \
          .
        docker push $$ECR/$$CI_REPO:$$LOCK_SHA
        docker push $$ECR/$$CI_REPO:latest
      fi
    agents:
      queue: default-queue

  - label: ":ruby: Test"
    key: test
    depends_on: warm-cache
    concurrency: 2
    concurrency_group: cassar/docker-test
    command: |
      ECR=416802459241.dkr.ecr.ap-southeast-2.amazonaws.com
      CI_IMAGE=$$ECR/flourish-ci:$$(sha256sum Gemfile.lock | cut -d' ' -f1)
      docker pull $$CI_IMAGE
      docker run --rm \
        -e RAILS_ENV=test \
        -e CI=true \
        $$CI_IMAGE \
        bin/rails db:test:prepare test test:system
    agents:
      queue: default-queue

  - label: ":rubocop: Lint"
    key: lint
    concurrency: 3
    concurrency_group: cassar/docker-lint
    command:
      - |
        docker run --rm \
          --volume "$(pwd):/rails" \
          --volume "/home/ubuntu/.bundle-cache:/bundle" \
          --workdir /rails \
          --env BUNDLE_WITHOUT="" \
          --env BUNDLE_PATH=/bundle \
          --memory 512m \
          ruby:3.4.8-slim \
          bash -c "
            apt-get update -qq &&
            apt-get install --no-install-recommends -y build-essential git libsqlite3-dev libyaml-dev pkg-config &&
            git config --global --add safe.directory '*' &&
            bundle install &&
            bundle exec rubocop
          "
      - sudo chown -R "$(id -u):$(id -g)" "$(pwd)" && sudo chown -R "$(id -u):$(id -g)" /home/ubuntu/.bundle-cache || true
    agents:
      queue: default-queue

  - label: ":shield: Audit"
    key: audit
    concurrency: 3
    concurrency_group: cassar/docker-lint
    command:
      - |
        docker run --rm \
          --volume "$(pwd):/rails" \
          --volume "/home/ubuntu/.bundle-cache:/bundle" \
          --workdir /rails \
          --env BUNDLE_WITHOUT="" \
          --env BUNDLE_PATH=/bundle \
          --memory 512m \
          ruby:3.4.8-slim \
          bash -c "
            apt-get update -qq &&
            apt-get install --no-install-recommends -y build-essential git libsqlite3-dev libyaml-dev pkg-config &&
            git config --global --add safe.directory '*' &&
            bundle install &&
            bundle exec bundler-audit check --update
          "
      - sudo chown -R "$(id -u):$(id -g)" "$(pwd)" && sudo chown -R "$(id -u):$(id -g)" /home/ubuntu/.bundle-cache || true
    agents:
      queue: default-queue

  - wait

  - label: ":docker: Build & Push"
    key: build
    concurrency: 1
    concurrency_group: cassar/docker-build
    command:
      - docker pull 416802459241.dkr.ecr.ap-southeast-2.amazonaws.com/flourish:latest 2>/dev/null || true
      - docker build --load --cache-from 416802459241.dkr.ecr.ap-southeast-2.amazonaws.com/flourish:latest --label service=flourish --tag 416802459241.dkr.ecr.ap-southeast-2.amazonaws.com/flourish:$$BUILDKITE_COMMIT --tag 416802459241.dkr.ecr.ap-southeast-2.amazonaws.com/flourish:latest .
      - docker push 416802459241.dkr.ecr.ap-southeast-2.amazonaws.com/flourish:$$BUILDKITE_COMMIT
      - docker push 416802459241.dkr.ecr.ap-southeast-2.amazonaws.com/flourish:latest
    agents:
      queue: default-queue
    branches: main

  - wait

  - label: ":rocket: Deploy"
    key: deploy
    command:
      - cp /home/ubuntu/.flourish-secrets .kamal/secrets
      - export KAMAL_REGISTRY_PASSWORD=$$(aws ecr get-login-password --region ap-southeast-2)
      - echo "KAMAL_REGISTRY_PASSWORD=$$KAMAL_REGISTRY_PASSWORD" >> .kamal/secrets
      - kamal deploy --skip-push
    agents:
      queue: default-queue
    branches: main
