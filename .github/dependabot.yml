version: 2
updates:
  # Ruby gems
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: daily
      time: "09:00"
      timezone: "Australia/Sydney"
    open-pull-requests-limit: 10
    groups:
      rails:
        patterns:
          - "rails"
          - "actioncable"
          - "actionmailer"
          - "actionmailbox"
          - "actionpack"
          - "actiontext"
          - "actionview"
          - "activejob"
          - "activemodel"
          - "activerecord"
          - "activestorage"
          - "activesupport"
      hotwire:
        patterns:
          - "turbo-rails"
          - "stimulus-rails"
      development:
        dependency-type: development

  # JavaScript packages
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: daily
      time: "09:00"
      timezone: "Australia/Sydney"
    open-pull-requests-limit: 10
    groups:
      tailwind:
        patterns:
          - "@tailwindcss/*"
          - "tailwindcss"
          - "daisyui"
      all:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
      time: "09:00"
      timezone: "Australia/Sydney"
    open-pull-requests-limit: 5
